<!DOCTYPE html>
<html lang="en">
<head>

    <title>cascading style sheet</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <style>
        h1{
            background-color: brown;
            color: white;
        }
        #text{
            color: blue;
            font-style: italic;
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            font-size: 10px;
            text-decoration: underline;
        }
        .link{
            color:black;
            text-decoration: none;
        }


    </style>
    </head>
