<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        .container{
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 50px 200px 50px;
        }

        .header{
            background-color:red;
            grid-column:1/3;
            /* grid-column-start: 1;
            grid -column-end: 3; */
         }
.aside{
            background-color:rgb(0, 255, 106);
            grid-column:1/3;
            /* grid-column-start: 1;
            grid -column-end: 3; */
         }
         .main{
            background-color:rgb(15, 14, 14);
            grid-column:1/3;
            /* grid-column-start: 1;
            grid -column-end: 3; */
         }
         .footer{
            background-color:rgb(10, 207, 207);
            grid-column:1/3;
            /* grid-column-start: 1;
            grid -column-end: 3; */
         }

    </style>
    <div class="container">
        <header class="header"></header>
        <aside class="aside"></aside>
        <main class="main"></main>
        <footer class="footer"></footer>
    </div>


</body>
</html>
